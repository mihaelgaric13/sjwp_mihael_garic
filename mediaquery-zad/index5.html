<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
     margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    font-family: 'Courier New', Courier, monospace;
    padding: 20px;
}
.grid{
    display: grid;
    gap: 10px   ;
}
@media(max-width: 1024px){
    .grid{
        grid-template-columns: repeat(3,1fr);
    }
    .card1{
        grid-column: span 2;
    }
}
@media (max-width: 1024px) {
    .grid{
        grid-template-columns: repeat(2, 1fr);
    }
    
}
@media(max-width: 767px){

    .grid{
        grid-template-columns: 1fr;
    }
}
.card{
    background: #cdb4db;
    padding: 40px;
    text-align: center;
    border-radius: 8px;
}
    </style>
</head>
<body>
    <div class="grid">
        <div class="card card1">Kartica1(2stupca)</div>
        <div class="card">Kartica2</div>
        <div class="card">Kartica3</div>
        <div class="card">Kartica4</div>
        <div class="card">Kartica5</div>
        <div class="card">Kartica6</div>

    </div>
</body>
</html>
