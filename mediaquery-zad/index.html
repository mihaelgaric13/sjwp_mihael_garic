<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak1</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f4f4f4;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}


.item {
    padding: 40px;
    color: white;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
}


.item1 { background: #6c5ce7; }
.item2 { background: #00b894; }
.item3 { background: #fdcb6e; color: black; }
.item4 { background: #e17055; }
.item5 { background: #0984e3; }
.item6 { background: #636e72; }
.item7 {background: lightblue; }
.item8 { background: rgb(202, 26, 52);}

/* Tablet */
@media (max-width: 1024px) {
    .grid-container {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Mobitel */
@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: 1fr;
    }
}
    </style>
</head>
<body>
    <div class="grid-container">
    <div class="item item1">Kartica 1</div>
    <div class="item item2">Kartica 2</div>
    <div class="item item3">Kartica 3</div>
    <div class="item item4">Kartica 4</div>
    <div class="item item5">Kartica 5</div>
    <div class="item item6">Kartica 6</div>
    <div class="item item7">Kartica 7</div>
    <div class="item item8">Kartica 8</div>
</div>
</body>
</html>
