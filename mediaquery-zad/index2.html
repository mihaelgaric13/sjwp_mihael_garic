<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zdatak 2</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    font-family: Arial, Helvetica, sans-serif;

}
.header,.footer{
    background: #a8dadc;
    text-align: center;
    padding: 40px;
}
.CONTAINER{
    display: grid;
    grid-template-columns: 260px 1fr;
}
.sidebar{
    background: #f1fa8c;
    padding: 80px;
}
.main{
    background: #ffd6a5;
    padding: 80px;
}
@media(max-width:1023px){
    .CONTAINER{
        grid-template-columns: 200px 1fr;
        text-align: center;
    }
}
@media (max-width:767px ){
    .CONTAINER{
        grid-template-columns: 1fr;
        
    }
    .sidebar{
        order: -1;
    }
}
    </style>
</head>
<body>
       <div class="header">HEDER(100%)</div>
       <div class="CONTAINER">
        <div class="sidebar">SIDEBAR(260px)</div>
        <div class="main">MAIN CONTENT</div>
       </div>
       <div class="footer">FOOTER(100%)</div>
</body>
</html>
