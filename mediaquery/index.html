<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media query</title>
    <style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}


.container {
  display: grid;
  gap: 10px;
  padding: 10px;

  height: 100vh; 
}

/* MOBILE */
.container {
  grid-template-columns: 1fr;
  grid-template-rows: repeat(4, 1fr); 
}


.box {
  color: black;
  font-size: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
}


.box1 { background: #f26c6c; }
.box2 { background: #f39c4a; }
.box3 { background: #e6c85c; }
.box4 { background: #b7d86c; }


@media (min-width: 600px) {
  .container {
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr); /* 2x2 */
  }
}


@media (min-width: 1024px) {
  .container {
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 1fr; /* jedan red */
  }
}
    </style>
</head>
<body>
    <div class="container">
  <div class="box box1">1</div>
  <div class="box box2">2</div>
  <div class="box box3">3</div>
  <div class="box box4">4</div>
</div>

</body>
</html>
