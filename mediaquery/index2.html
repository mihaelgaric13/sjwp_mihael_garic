<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .container {
    display: grid;
    width: 100%;
    height: 100vh;
  }

  .box {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
  }

  .a1 { background: #f16c6c; }
  .a2 { background: #f39a4a; }
  .a3 { background: #e8c95f; }
  .a4 { background: #b7db6f; }

  .container {
    grid-template-areas:
      "a1"
      "a2"
      "a3"
      "a4";
    grid-template-columns: 1fr;
  }

  .a1 { grid-area: a1; }
  .a2 { grid-area: a2; }
  .a3 { grid-area: a3; }
  .a4 { grid-area: a4; }

  @media (min-width: 600px) {
    .container {
      grid-template-areas:
        "a1 a2"
        "a3 a4";
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (min-width: 900px) {
    .container {
      grid-template-areas: "a1 a2 a3 a4";
      grid-template-columns: repeat(4, 1fr);
    }
  }
</style>

</head>
<body>

<div class="container">
  <div class="box a1">1</div>
  <div class="box a2">2</div>
  <div class="box a3">3</div>
  <div class="box a4">4</div>
</div>

</body>
</html>
